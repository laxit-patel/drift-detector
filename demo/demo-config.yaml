# Demo config for the offline fine-tuning harness (demo/run_demo.py).
# The KB root points at the demo output dir; the demo seeds it directly.
kb:
  root: demo/out/kb

# Severity tuning knobs — change these and re-run to see findings shift.
delivery:
  reportsProject: demo/reports          # not used in the offline demo (no commit)
  reviewHorizonMonths: 6                 # a runtime EOL within N months -> REVIEW (else OK until then)
  urgentDeadlineDays: 90

# Feeds are only used by the live `ingest` command (Tier 2+). The offline demo
# seeds the KB itself, so these are here for reference / when you go to real feeds.
feeds:
  - { techKey: api:shopify, label: Shopify Admin API, category: integration, adapter: rss, url: https://shopify.dev/changelog/feed.xml, tier: 1 }
  - { techKey: api:twilio,  label: Twilio,            category: integration, adapter: rss, url: https://www.twilio.com/en-us/changelog.feed.xml, tier: 1 }
  - { techKey: runtime:node,   label: Node.js, category: runtime, adapter: endoflife, url: nodejs, tier: 1 }
  - { techKey: runtime:php,    label: PHP,     category: runtime, adapter: endoflife, url: php,    tier: 1 }
  - { techKey: runtime:python, label: Python,  category: runtime, adapter: endoflife, url: python, tier: 1 }
