# Drop this into a repo as .github/workflows/drift.yml to keep its integrations green in CI.
# Deterministic — runs the scan+audit pipeline in the runner; no LLM, no tokens.
name: Drift

on:
  schedule:
    - cron: "0 7 * * 0"        # weekly: did the world move? -> Security tab (+ optional Chat)
  pull_request:               # per PR: does this change add drift? -> GitHub flags NEW alerts
  workflow_dispatch:

permissions:
  contents: read
  security-events: write      # required to upload SARIF to code-scanning

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: laxit-patel/drift-detector@v0.3.0-beta
        with:
          path: .
          # gate only on PRs: fail the check if the PR introduces a DEPRECATED finding.
          # (GitHub code-scanning also flags NEW alerts on the PR from the uploaded SARIF.)
          fail-on-deprecated: ${{ github.event_name == 'pull_request' }}
          chat-webhook: ${{ secrets.DRIFT_CHAT_WEBHOOK }}   # optional; set it in repo secrets
