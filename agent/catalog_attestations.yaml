# Catalog attestations — "somebody checked this vendor's deprecation page on DATE".
#
# WHY THIS EXISTS, and why it is not a count of entries.
#
# A vendor with 272 detected call-sites and no catalog data used to render exactly like a
# vendor that was genuinely clean. That is how eight already-past Amazon SP-API
# retirements sat unreported: the tool had an elaborate conscience for what it could not
# SEE (shape verdicts, residue, per-language signal coverage) and none at all for what it
# had never been TAUGHT.
#
# The obvious fix — "this vendor has N catalog entries, so it is audited" — is gameable
# and wrong. You cannot know completeness from the inside, and one junk entry would flip a
# vendor from unaudited to audited. eBay proves it: twelve entries, and the vendor's own
# page still lists operations the catalog does not have.
#
# The only honest scalar is the one below: a human or agent opened the vendor's canonical
# deprecation page on a stated date and reconciled it against the catalog. An entry count
# is a claim about our file; this is a claim about the world.
#
# RULES
#   • `checked` is the date the SOURCE PAGE WAS ACTUALLY FETCHED — not the date an entry
#     was written, and never a remembered date.
#   • `source` must be the vendor's canonical deprecation/sunset page, the one that would
#     reveal a retirement we are missing.
#   • Attestations go STALE (see shapes/catalog verdicts). Re-checking means re-fetching
#     the page and moving the date, not editing this line.
#   • A vendor absent from this file is UNAUDITED even if it has catalog entries.

- vendor: Amazon SP-API
  checked: "2026-07-20"
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations
  note: >-
    SP-API Deprecation Schedule, the vendor's canonical table. Reconciled in full: 8 of
    the 13 listed retirements were staged; the remainder (Authorization v1, Data Kiosk
    dataset) do not appear in any scanned repo. Two entries are family-scoped because
    Amazon names an operation subset without enumerating it.

- vendor: eBay
  checked: "2026-07-20"
  source: https://www.edp.ebay.com/rss/api-deprecation
  note: >-
    Reconciled against eBay's structured deprecation RSS (canonical
    developer.ebay.com/rss/api-deprecation returns 403 to non-browser clients; the
    www.edp.ebay.com mirror serves the identical feed and is what was fetched). All 10
    current feed items reviewed: 7 method-scoped retirements added, the existing
    GetCategoryFeatures date independently confirmed, one notification-only item skipped
    as undetectable. STILL OPEN: Merchandising, Return Management and Business Policies
    Management are whole-API deprecations with decommission date TBD and no host or
    operation scope we could verify — they are NOT in the catalog.

- vendor: Shopify
  checked: "2026-07-21"
  source: https://shopify.dev/docs/api/usage/versioning
  note: >-
    Shopify retirements are COMPUTED, not curated: the versioning page publishes a
    rule (a version is accessible for 12 months + 15 days from its calendar release),
    verified this session against all 7 rows of the published support table. So every
    detected version is dated by agent/lib/version_lifecycle without a per-version
    catalog entry, and the coverage cannot go stale as new quarters ship. Note Shopify
    "falls forward" — a retired version is served by the oldest accessible version, not
    a 4xx, so an out-of-date version is silent behavioural drift.
