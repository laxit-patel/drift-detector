# Vendor catalog — used to CLASSIFY discovered URL hosts (the scan finds all http(s) URLs; this
# labels the ones we recognize; the rest surface as "Unknown external").
# domains: a dotted value is matched as a registrable-domain SUFFIX (ebay.com -> api.sandbox.ebay.com);
#          a value with no dot is a distinctive host FRAGMENT (sellingpartnerapi -> regional Amazon hosts).
# Keep API-specific hosts (api.github.com, graph.facebook.com) where the bare domain is noisy.
# versionRegex: one capture group = the API version, applied to the URL (default covers /vN and dates).

