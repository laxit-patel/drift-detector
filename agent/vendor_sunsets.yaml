# Vendor API-sunset catalog — CURATED. This is the one thing no CVE/EOL feed covers:
# when a vendor RETIRES a version of their API (your integration breaks in production).
#
# RULES (match the tool's principles):
#   • Every entry MUST cite a `source` URL. Never invent a date — if you can't source it, don't add it.
#   • `vendor` must match the name in agent/vendors.yaml (e.g. "Amazon SP-API", "Shopify").
#   • `version`: the API version string as it appears in your code/URLs (e.g. v0, v3, 2023-01),
#     or "*" for a whole-API retirement (any usage of that vendor is flagged).
#   • `domain`: OPTIONAL — scope the entry to a specific host (e.g. svcs.ebay.com). Use this when a
#     vendor shares one version string across a DEAD legacy API and a LIVE one (eBay's "v1" is used
#     by both the retired Finding API on svcs.ebay.com AND the live OAuth/REST on api.ebay.com).
#     A domain-scoped entry flags ONLY that host, and the host match is itself the confirmation.
#   • `retires`: YYYY-MM-DD. Omit if the API is already deprecated with no fixed date
#     (it will be flagged as action-required without a date).
#   • `replacement` and `note` are optional but make the finding actionable.
#
# The tool joins these against the ENDPOINT inventory (which has file:line call-sites), so a
# finding reads: "SP-API v0 retires <date> — used at these 14 file:line across 6 repos".
#
# ── Template (copy, fill with a real sourced announcement, uncomment) ─────────────────
# Quote dates and date-like versions ("YYYY-MM-DD") so YAML keeps them as strings.
# - { vendor: Amazon SP-API, version: v0, retires: "2026-09-30", replacement: v2,
#     source: https://developer-docs.amazon.com/sp-api/changelog, note: Orders v0 endpoints }
# - { vendor: Shopify, version: "2023-01", retires: "2024-01-01", replacement: "2024-01",
#     source: https://shopify.dev/docs/api/usage/versioning, note: quarterly version sunset }
# ──────────────────────────────────────────────────────────────────────────────────────

# Seed — historical/verifiable only. Extend with your vendors' actual announcements.
- vendor: Amazon MWS
  version: "*"
  replacement: Amazon SP-API
  source: https://developer-docs.amazon.com/sp-api/docs/migrating-from-amazon-mws
  note: Amazon Marketplace Web Service (MWS) is deprecated; all usage should migrate to SP-API. Confirm the current cut-off date for your marketplace.

# eBay legacy "traditional" APIs — deprecated 2024-01-04, DECOMMISSIONED 2025-02-05 (already dead).
# Domain-scoped so the live OAuth/REST host (api.ebay.com) and modern Sell/Buy APIs are NOT flagged.
# Source: eBay Developers Program API Deprecation Status + Q3 2024 newsletter.
- vendor: eBay
  domain: svcs.ebay.com
  retires: "2025-02-05"
  replacement: Browse API
  # Text fragment deep-links to the Finding API row on eBay's deprecation-status table
  # (scrolls/highlights in modern browsers; degrades to the plain page otherwise).
  source: "https://developer.ebay.com/develop/get-started/api-deprecation-status#:~:text=Finding%20API"
  note: eBay Finding API (svcs.ebay.com) decommissioned 2025-02-05; migrate to the RESTful Browse API.
- vendor: eBay
  domain: open.api.ebay.com
  retires: "2025-02-05"
  replacement: Browse API
  source: "https://developer.ebay.com/develop/get-started/api-deprecation-status#:~:text=Shopping%20API"
  note: eBay Shopping API (open.api.ebay.com) decommissioned 2025-02-05; migrate to the RESTful Browse API.

# eBay Trading API — OPERATION-scoped. The Trading API as a whole is NOT retired
# (eBay still ships releases), but individual calls are decommissioned on their own
# schedules, all on the same host (api.ebay.com) with no URL version. Only an
# `operation` scope can say "GetCategories is dead, GetItem is alive".
# Both dates below were read directly off eBay's API Deprecation Status table
# (Wayback snapshot 2026-05-13) — not inferred.
- vendor: eBay
  operation: GetCategoryFeatures
  retires: "2026-06-04"
  replacement: Metadata API
  source: "https://developer.ebay.com/develop/get-started/api-deprecation-status#:~:text=GetCategoryFeatures"
  note: Deprecated 2025-07-01; decommissioned 2026-06-04. Migrate to the Metadata API for category metadata.
- vendor: eBay
  operation: GetCategories
  retires: "2026-04-15"
  replacement: Taxonomy API
  source: "https://developer.ebay.com/develop/get-started/api-deprecation-status#:~:text=GetCategories"
  note: Decommissioned from the Trading API. Migrate to the Taxonomy API (category tree) + Metadata API.
# These four aged off the deprecation-status table (it only lists current/recent
# items), so each date was read from the Trading API release-notes index instead —
# the release that actually shipped the decommission. Verified 2026-07-20.
- vendor: eBay
  operation: GetCategorySpecifics
  retires: "2022-04-22"
  replacement: Taxonomy API getItemAspectsForCategory
  source: "https://developer.ebay.com/devzone/xml/docs/ReleaseNotesArchive.html#:~:text=GetCategorySpecifics%20Call%20Decommisioned"
  note: Trading release 1255 — "GetCategorySpecifics Call Decommissioned". Use Taxonomy getItemAspectsForCategory.
- vendor: eBay
  operation: AddDispute
  retires: "2023-01-27"
  replacement: Post-Order API cancellation
  source: "https://developer.ebay.com/devzone/xml/docs/ReleaseNotesArchive.html#:~:text=Six%20Dispute%20Calls%20Decommissioned"
  note: Trading release 1295 — "Six Dispute Calls Decommissioned"; AddDispute removed from the WSDL.
- vendor: eBay
  operation: GetCharities
  retires: "2023-09-18"
  replacement: Charity API
  source: "https://developer.ebay.com/devzone/xml/docs/ReleaseNotesArchive.html#:~:text=GetCharities%20Call%20Decommissioned"
  note: Trading release 1327 — "GetCharities Call Decommissioned". Use the Charity API (commerce/charity/v1).
- vendor: eBay
  operation: GetSuggestedCategories
  retires: "2024-07-01"
  replacement: Taxonomy API getCategorySuggestions
  source: "https://developer.ebay.com/devzone/xml/docs/ReleaseNotesArchive.html#:~:text=Decommissioned%20GetSuggestedCategories%20call"
  note: Trading release 1367 — "Decommissioned GetSuggestedCategories call".

# eBay Large Merchant Services — whole SOAP services, so DOMAIN-scoped. Date read
# from eBay's Dec-2021 newsletter: "The Large Merchant Services APIs (Bulk Data
# Exchange, File Transfer, and Merchant Data) will be decommissioned on April 30,
# 2022." Confirmed by the Q1-2022 newsletter. Verified 2026-07-20.
- vendor: eBay
  domain: webservices.ebay.com
  retires: "2022-04-30"
  replacement: Sell Feed API
  source: "https://developer.ebay.com/updates/newsletter/2021_12_news#:~:text=Bulk%20Data%20Exchange"
  note: Large Merchant Services (Bulk Data Exchange) decommissioned 2022-04-30. The same Merchant Data XML feeds are served by the Sell Feed API as REST tasks.
- vendor: eBay
  domain: webservices.sandbox.ebay.com
  retires: "2022-04-30"
  replacement: Sell Feed API
  source: "https://developer.ebay.com/updates/newsletter/2021_12_news#:~:text=Bulk%20Data%20Exchange"
  note: Large Merchant Services (Bulk Data Exchange (sandbox)) decommissioned 2022-04-30. The same Merchant Data XML feeds are served by the Sell Feed API as REST tasks.
- vendor: eBay
  domain: storage.ebay.com
  retires: "2022-04-30"
  replacement: Sell Feed API
  source: "https://developer.ebay.com/updates/newsletter/2021_12_news#:~:text=File%20Transfer"
  note: Large Merchant Services (File Transfer) decommissioned 2022-04-30. The same Merchant Data XML feeds are served by the Sell Feed API as REST tasks.
- vendor: eBay
  domain: storage.sandbox.ebay.com
  retires: "2022-04-30"
  replacement: Sell Feed API
  source: "https://developer.ebay.com/updates/newsletter/2021_12_news#:~:text=File%20Transfer"
  note: Large Merchant Services (File Transfer (sandbox)) decommissioned 2022-04-30. The same Merchant Data XML feeds are served by the Sell Feed API as REST tasks.

# ── Amazon SP-API ────────────────────────────────────────────────────────────────────
# Fetched 2026-07-20 from https://developer-docs.amazon/sp-api/docs/sp-api-deprecations
# (the vendor's own schedule). Dates converted from the page's US format; `retires` is
# the REMOVAL/EOL date — when calls stop working — not the earlier deprecation notice.
#
# Scoped by `path` (API family), NOT by version: SP-API retires per (family, version),
# and four different APIs share the string "v0" with four different fates —
# /fba/inbound/v0 stopped working 2025-01-21 while /finances/v0 runs to 2027-08-27.
# A version-scoped entry would date every v0 call-site identically and invent most of them.
- vendor: Amazon SP-API
  path: /reports/2020-09-04
  retires: '2024-06-27'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=Reports
  note: Reports v2020-09-04 removed 2024-06-27 (deprecated July 2021).
- vendor: Amazon SP-API
  path: /feeds/2020-09-04
  retires: '2024-06-27'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=Feeds
  note: Feeds v2020-09-04 removed 2024-06-27 (deprecated July 2021).
- vendor: Amazon SP-API
  path: /fba/smallAndLight/v1
  retires: '2024-03-27'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=FBA%20Small%20and%20Light
  note: FBA Small and Light programme ended — NA/EU removed 2023-09-26, JP 2024-03-27.
- vendor: Amazon SP-API
  path: /orders/v0
  retires: '2027-03-27'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=Orders
  note: Orders v0 deprecated 2026-01-28, removed 2027-03-27.
- vendor: Amazon SP-API
  path: /finances/v0
  retires: '2027-08-27'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=Finances
  note: Finances v0 deprecated 2025-07-21, removed 2027-08-27.
- vendor: Amazon SP-API
  path: /catalog/v0
  retires: '2026-06-30'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=Catalog%20Items
  note: Catalog Items v0 retired in two waves — listCatalogItems/getCatalogItem removed 2025-04-24, listCatalogCategories
    removed 2026-06-30. Both dates have passed; the family is gone. Dated at the final removal.
- vendor: Amazon SP-API
  path: /fba/inbound/v0
  retires: '2025-01-21'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=Fulfillment%20Inbound
  note: 'Fulfillment Inbound v0 — Amazon removed MULTIPLE (unnamed) operations 2025-01-21, plus getInboundGuidance
    2024-03-27. Family-scoped: verify which of your calls are affected. Migration target is Fulfillment
    Inbound v2024-03-20.'
- vendor: Amazon SP-API
  path: /mfn/v0
  retires: '2024-03-27'
  source: https://developer-docs.amazon/sp-api/docs/sp-api-deprecations#:~:text=Merchant%20Fulfillment
  note: 'Merchant Fulfillment v0 — Amazon removed THREE (unnamed) operations 2024-03-27. Family-scoped:
    verify which of your calls are affected.'
