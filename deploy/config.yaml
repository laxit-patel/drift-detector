# Production config for the containerized weekly run.
# Paths are relative to the container WORKDIR (/work); `state/` is the mounted,
# git-persisted volume. Override by mounting your own at /work/config.yaml
# (or set CONFIG_FILE to another path).

kb: { root: state/kb }                 # change knowledge base (append-only JSONL) — persisted in git

source:
  type: github
  owner: laxit-patel                   # the authenticated GitHub user (own repos via /user/repos?affiliation=owner)
  tokenEnv: GITHUB_TOKEN               # PAT with repo read scope; falls back to `gh auth token` if unset

scan:
  activeWindowDays: 365                # only repos with a commit in the last year

delivery:
  reportsProject: state/reports        # required by config; the container writes reports here (git, not the GitLab API)
  reviewHorizonMonths: 6

# Marketplace/integration changelogs (rss) + runtime EOL (endoflife) are proven live.
# Add framework/marketplace html_changelog feeds as you expand; marketplace contract-drift
# detection needs the live Claude classify stage wired (see docs/DEPLOY.md).
feeds:
  - { techKey: api:shopify,    label: Shopify Admin API, category: integration, adapter: rss, url: https://shopify.dev/changelog/feed.xml, tier: 1 }
  - { techKey: api:twilio,     label: Twilio,  category: integration, adapter: rss, url: https://www.twilio.com/en-us/changelog.feed.xml, tier: 1 }
  - { techKey: runtime:php,    label: PHP,     category: runtime,  adapter: endoflife, url: php,     tier: 1 }
  - { techKey: runtime:node,   label: Node.js, category: runtime,  adapter: endoflife, url: nodejs,  tier: 1 }
  - { techKey: runtime:python, label: Python,  category: runtime,  adapter: endoflife, url: python,  tier: 1 }
  - { techKey: runtime:laravel, label: Laravel, category: framework, adapter: endoflife, url: laravel, tier: 1 }
