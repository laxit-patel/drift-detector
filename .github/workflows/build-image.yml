name: build-image

# Build & push the container to GHCR only when the code that goes INTO it changes.
# The weekly run (monitor.yml) just pulls the latest image — it never rebuilds.
on:
  push:
    branches: [master, main]
    paths:
      # config is mounted at run time (not baked), so editing it needs no rebuild
      - 'agent/**'
      - 'docker/run-monitor.sh'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch: {}          # allow a manual rebuild from the Actions tab

concurrency:
  group: build-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
