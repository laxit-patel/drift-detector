name: "Drift Detector"
description: "Scan a repo for third-party integration drift + audit CVEs / end-of-life / vendor API sunsets, and upload SARIF. Deterministic — no LLM, no tokens."
branding:
  icon: "radio"
  color: "orange"
inputs:
  path:
    description: "Folder to scan (defaults to the checkout root)."
    default: "."
  fail-on-deprecated:
    description: "Fail the job (exit non-zero) if any un-muted DEPRECATED finding is present."
    default: "false"
  upload-sarif:
    description: "Upload findings.sarif to GitHub code-scanning (Security tab + PR alerts)."
    default: "true"
  chat-webhook:
    description: "Optional Google Chat incoming-webhook URL to post a summary."
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
    - name: Run drift-detector (scan -> audit -> deliver)
      shell: bash
      run: |
        FLAGS=()
        [ "${{ inputs.fail-on-deprecated }}" = "true" ] && FLAGS+=(--fail-on-deprecated)
        [ -n "${{ inputs.chat-webhook }}" ] && FLAGS+=(--chat-webhook "${{ inputs.chat-webhook }}")
        "${{ github.action_path }}/bin/drift-scan" run \
          --root "${{ inputs.path }}" \
          --state "${{ inputs.path }}/.drift-detector" \
          --now "$(date +%F)" --progress "${FLAGS[@]}"
    - name: Upload SARIF to code-scanning
      # run even if the gate failed the previous step, so the alerts still surface —
      # but only if the scan actually produced a SARIF (skip when the run died early).
      if: ${{ always() && inputs.upload-sarif == 'true' && hashFiles(format('{0}/.drift-detector/findings.sarif', inputs.path)) != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: "${{ inputs.path }}/.drift-detector/findings.sarif"
        category: drift-detector
